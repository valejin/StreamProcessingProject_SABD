version: '3.8'

services:

  # ─── Zookeeper (richiesto da Kafka) ────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - sabd-network

  # ─── Kafka Broker ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - sabd-network

  # ─── InfluxDB (storage per metriche time-series) ────────────────
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpass
      DOCKER_INFLUXDB_INIT_ORG: sabd
      DOCKER_INFLUXDB_INIT_BUCKET: flights
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: sabd-influx-token-2025
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - sabd-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Grafana (dashboard) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    depends_on:
      - influxdb
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning
      - ../grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - sabd-network

  # ─── Flink JobManager ───────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.18-java11
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        heartbeat.interval: 10000
        heartbeat.timeout: 120000
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: flights
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: sabd-influx-token-2025
      INFLUXDB_ORG: sabd
      INFLUXDB_BUCKET: flights
      Q1_OUTPUT_PATH: /results/q1_output.csv
      Q2_OUTPUT_PATH_1H: /results/q2_output_1h.csv
      Q2_OUTPUT_PATH_6H: /results/q2_output_6h.csv
      Q2_OUTPUT_PATH_GLOBAL: /results/q2_output_global.csv
    volumes:
      - ../Results:/results
    networks:
      - sabd-network

  # ─── Flink TaskManager ──────────────────────────────────────────
  flink-taskmanager:
    image: flink:1.18-java11
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        heartbeat.interval: 10000
        heartbeat.timeout: 120000
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: flights
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: sabd-influx-token-2025
      INFLUXDB_ORG: sabd
      INFLUXDB_BUCKET: flights
    volumes:
      - ../Results:/results
    networks:
      - sabd-network

networks:
  sabd-network:
    driver: bridge

volumes:
  results:
  influxdb-data:
  grafana-data:
